# KDSE Docker Compose Configuration
# Deployment: KDSE Runtime subsystem (github.com/kdse/runtime)
# Contains: CLI (kdse) and MCP Server (kdse-mcp) services
# Version: 2.0.0

services:
  # KDSE MCP Server - Default HTTP mode
  kdse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp
    environment:
      - KDSE_REPO_ROOT=/repo
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
    volumes:
      # Mount current directory to /repo to avoid overwriting binaries in /app
      - .:/repo:ro
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    networks:
      - kdse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # KDSE MCP Server - STDIO mode (local development)
  kdse-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp-stdio
    environment:
      - KDSE_REPO_ROOT=/repo
      - MCP_TRANSPORT=stdio
    volumes:
      # Mount current directory to /repo to avoid overwriting binaries in /app
      - .:/repo:ro
    stdin_open: true  # -i
    tty: true         # -t
    networks:
      - kdse-network
    restart: unless-stopped

  # KDSE Runtime CLI (utility container)
  kdse-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-runtime
    environment:
      - KDSE_REPO_ROOT=/repo
    volumes:
      # Mount current directory to /repo to avoid overwriting /app
      - .:/repo:ro
    command: ["/app/kdse", "status"]
    networks:
      - kdse-network

networks:
  kdse-network:
    driver: bridge
