# KDSE MCP Server - Local Testing Docker Compose
# Version: 2.0.0

services:
  kdse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:local
    container_name: kdse-mcp
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=18181
    ports:
      - "18181:18181"
    volumes:
      - .:/repo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  kdse-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:local
    container_name: kdse-mcp-stdio
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      - .:/repo
    stdin_open: true
    tty: true

networks:
  default:
    name: kdse-local-network
