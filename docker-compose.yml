# KDSE Docker Compose Configuration
# Deployment: KDSE Runtime subsystem (github.com/kdse/runtime)
# Contains: CLI (kdse) and MCP Server (kdse-mcp) services
# Version: 2.0.0

services:
  # KDSE MCP Server - STDIO mode (local development)
  kdse-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp-stdio
    environment:
      - KDSE_REPO_ROOT=/app
      - MCP_TRANSPORT=stdio
    volumes:
      # Mount current directory read-only
      - .:/app:ro
    stdin_open: true  # -i
    tty: true         # -t
    networks:
      - kdse-network
    restart: unless-stopped
    profiles:
      - stdio
      - local
      - development

  # KDSE MCP Server - HTTP mode (development server)
  kdse-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp-http
    environment:
      - KDSE_REPO_ROOT=/app
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
    volumes:
      # Mount current directory read-only
      - .:/app:ro
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    networks:
      - kdse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - http
      - development

  # KDSE Runtime CLI (utility container)
  kdse-runtime:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-runtime
    environment:
      - KDSE_REPO_ROOT=/app
    volumes:
      # Mount current directory
      - .:/app
    command: ["help"]
    networks:
      - kdse-network
    profiles:
      - runtime

networks:
  kdse-network:
    driver: bridge
