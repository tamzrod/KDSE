# KDSE MCP Server - Local Testing Docker Compose
# Version: 2.0.0
#
# Usage:
#   docker compose up -d           # Start HTTP server
#   docker compose up kdse-mcp-stdio  # Start STDIO mode for AI integration
#
# Notes:
#   - Project root is determined by Git (git rev-parse --show-toplevel)
#   - The .kdse directory is created beside .git in the repository root
#   - No hard-coded paths like /app or /repo are used

services:
  # KDSE MCP Server - HTTP mode
  kdse-mcp:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:local
    container_name: kdse-mcp
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=18181
    ports:
      - "18181:18181"
    volumes:
      # Mount repository - Git resolver finds the project root automatically
      - .:/workspace
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:18181/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # KDSE MCP Server - STDIO mode (for interactive testing)
  kdse-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:local
    container_name: kdse-mcp-stdio
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      # Mount repository - Git resolver finds the project root automatically
      - .:/workspace
    stdin_open: true
    tty: true

networks:
  default:
    name: kdse-local-network
