# KDSE MCP Server - Production Deployment for Linux Droplets
# DigitalOcean Droplet / Ubuntu Linux VPS
# Version: 0.2.0

services:
  # STDIO mode - for local development via docker exec
  kdse-mcp-stdio:
    build:
      context: ${KDSE_BUILD_CONTEXT:-../..}
      dockerfile: ${KDSE_DOCKERFILE:-Dockerfile}
    image: ${KDSE_IMAGE:-kdse-mcp}:${KDSE_TAG:-latest}
    container_name: ${KDSE_STDIO_CONTAINER_NAME:-kdse-mcp-stdio}
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=stdio
      - KDSE_REPO_ROOT=${KDSE_REPO_ROOT:-/data/kdse}
    volumes:
      - ${KDSE_DATA_PATH:-/data/kdse}:/data/kdse:ro
    stdin_open: true
    tty: true
    networks:
      - kdse-network
    profiles:
      - stdio

  # HTTP mode - for remote MCP client connections
  kdse-mcp-http:
    build:
      context: ${KDSE_BUILD_CONTEXT:-../..}
      dockerfile: ${KDSE_DOCKERFILE:-Dockerfile}
    image: ${KDSE_IMAGE:-kdse-mcp}:${KDSE_TAG:-latest}
    container_name: ${KDSE_HTTP_CONTAINER_NAME:-kdse-mcp-http}
    restart: unless-stopped
    environment:
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
      - KDSE_REPO_ROOT=${KDSE_REPO_ROOT:-/data/kdse}
    volumes:
      - ${KDSE_DATA_PATH:-/data/kdse}:/data/kdse:ro
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${MCP_HTTP_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - kdse-network
    profiles:
      - http

networks:
  kdse-network:
    name: ${KDSE_NETWORK:-kdse-mcp-network}
    driver: bridge
