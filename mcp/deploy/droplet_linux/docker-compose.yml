# KDSE MCP Server - Production Docker Compose Configuration
# Linux Droplet Deployment

services:
  # KDSE MCP Server - STDIO mode
  kdse-mcp-stdio:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: kdse-mcp:production
    container_name: kdse-mcp-stdio
    environment:
      - KDSE_REPO_ROOT=${KDSE_REPO_ROOT:-/app}
      - MCP_TRANSPORT=stdio
    volumes:
      - ../../..:/app:ro
    stdin_open: true
    tty: true
    networks:
      - kdse-network
    restart: unless-stopped
    profiles:
      - stdio
      - local
      - development

  # KDSE MCP Server - HTTP mode (recommended for production)
  kdse-mcp-http:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: kdse-mcp:production
    container_name: kdse-mcp-http
    environment:
      - KDSE_REPO_ROOT=${KDSE_REPO_ROOT:-/app}
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
    volumes:
      - ../../..:/app:ro
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    networks:
      - kdse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${MCP_HTTP_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"
    profiles:
      - http
      - production

networks:
  kdse-network:
    driver: bridge
