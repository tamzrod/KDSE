# KDSE MCP Server - Production Docker Compose Configuration
# Linux Droplet Deployment
# Self-contained production image - no volume mounts, binaries embedded in image

services:
  # KDSE MCP Server - HTTP mode (default for production)
  kdse-mcp:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: kdse-mcp:production
    container_name: kdse-mcp
    environment:
      - KDSE_REPO_ROOT=/repo
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    networks:
      - kdse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${MCP_HTTP_PORT:-8080}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  # KDSE MCP Server - STDIO mode
  kdse-mcp-stdio:
    build:
      context: ../../..
      dockerfile: Dockerfile
    image: kdse-mcp:production
    container_name: kdse-mcp-stdio
    environment:
      - KDSE_REPO_ROOT=/repo
      - MCP_TRANSPORT=stdio
    stdin_open: true
    tty: true
    networks:
      - kdse-network
    restart: unless-stopped

networks:
  kdse-network:
    driver: bridge
