# KDSE MCP Server Docker Compose Configuration
# Version: 0.2.0
# DEVELOPMENT ONLY - Local development with Docker Compose
# For production deployment, use mcp/deploy/droplet_linux/docker-compose.yml

services:
  # KDSE MCP Server - STDIO mode (local development)
  kdse-mcp-stdio:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp-stdio
    environment:
      - KDSE_REPO_ROOT=/workspace/project/KDSE
      - MCP_TRANSPORT=stdio
    volumes:
      # Mount KDSE repository read-only
      - ${KDSE_REPO_PATH:-../}:/workspace/project/KDSE:ro
    stdin_open: true  # -i
    tty: true         # -t
    networks:
      - kdse-network
    restart: unless-stopped
    profiles:
      - stdio
      - local
      - development

  # KDSE MCP Server - HTTP mode (development server)
  kdse-mcp-http:
    build:
      context: .
      dockerfile: Dockerfile
    image: kdse-mcp:dev
    container_name: kdse-mcp-http
    environment:
      - KDSE_REPO_ROOT=/workspace/project/KDSE
      - MCP_TRANSPORT=http
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-8080}
    volumes:
      # Mount KDSE repository read-only
      - ${KDSE_REPO_PATH:-../}:/workspace/project/KDSE:ro
    ports:
      - "${MCP_HTTP_PORT:-8080}:${MCP_HTTP_PORT:-8080}"
    networks:
      - kdse-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    profiles:
      - http
      - development

networks:
  kdse-network:
    driver: bridge
