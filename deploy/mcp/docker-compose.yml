# KDSE MCP Server - Production Docker Compose
# Target: DigitalOcean with Nginx Proxy Manager
# Network: nginx-proxy-manager_default (external)
# Version: 2.0.0
#
# Notes:
#   - Project root is determined by Git (git rev-parse --show-toplevel)
#   - The .kdse directory is created beside .git in the repository root
#   - No hard-coded paths like /app or /repo are used

services:
  # KDSE MCP Server - HTTP mode (production)
  kdse-mcp:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: kdse-mcp:${IMAGE_TAG:-production}
    container_name: kdse-mcp
    environment:
      - MCP_TRANSPORT=${MCP_TRANSPORT:-http}
      - MCP_HTTP_PORT=${MCP_HTTP_PORT:-18181}
    ports:
      - "${MCP_HTTP_PORT:-18181}:${MCP_HTTP_PORT:-18181}"
    volumes:
      # Mount repository - Git resolver finds the project root automatically
      - ${KDSE_REPO_HOST_PATH:-../../..}:/workspace
    networks:
      - proxy
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:${MCP_HTTP_PORT:-18181}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "${LOG_MAX_SIZE:-10m}"
        max-file: "${LOG_MAX_FILES:-3}"

  # KDSE MCP Server - STDIO mode (development)
  kdse-mcp-stdio:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: kdse-mcp:${IMAGE_TAG:-production}
    container_name: kdse-mcp-stdio
    environment:
      - MCP_TRANSPORT=stdio
    volumes:
      # Mount repository - Git resolver finds the project root automatically
      - ${KDSE_REPO_HOST_PATH:-../../..}:/workspace
    stdin_open: true
    tty: true
    networks:
      - proxy
    restart: unless-stopped

networks:
  proxy:
    external: true
    name: nginx-proxy-manager_default
