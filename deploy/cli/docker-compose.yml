# KDSE CLI - Authoritative Production Docker Compose
# Target: Isolated CLI runtime
# Version: 2.0.0
#
# Notes:
#   - Project root is determined by Git (git rev-parse --show-toplevel)
#   - The .kdse directory is created beside .git in the repository root
#   - No hard-coded paths like /app or /repo are used

services:
  # KDSE Runtime CLI
  kdse-runtime:
    build:
      context: ../..
      dockerfile: Dockerfile
    image: kdse-cli:${IMAGE_TAG:-production}
    container_name: kdse-runtime
    volumes:
      # Mount repository - Git resolver finds the project root automatically
      - ${KDSE_REPO_PATH:-../..}:/workspace
    command: ["status"]
    networks:
      - kdse-cli-network

networks:
  kdse-cli-network:
    driver: bridge
